res.send(`
<!DOCTYPE html>
<html>
<head>
<title>WELCOME TO FUNBOT</title>
<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#2196f3;
    color:white;
    border:none;
    cursor:pointer;
}

#status{
    margin-top:15px;
    font-weight:bold;
}

#debug{
    margin-top:20px;
    background:black;
    color:#00ff00;
    height:250px;
    overflow:auto;
    padding:10px;
    font-family:Consolas;
    font-size:12px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">

<h2>🤖 FUNBOT LOGIN</h2>

<input id="user" placeholder="Main Bot Username">
<input id="pass" type="password" placeholder="Main Bot Password">

<button onclick="login()">LOGIN</button>

<div id="status"></div>

<div id="debug"></div>

</div>

<script>

function log(t){

    let d = document.getElementById("debug");

    d.innerHTML += t + "\\n";

    d.scrollTop = d.scrollHeight;
}

async function login(){

    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    document.getElementById("status").innerHTML = "Connecting...";

    log("Sending login request...");
    log("Username: " + user);

    try{

        let res = await fetch("/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:user,
                password:pass
            })
        });

        let txt = await res.text();

        log("RAW SERVER RESPONSE:");
        log(txt);

        let data;

        try{
            data = JSON.parse(txt);
        }catch(e){

            log("JSON PARSE ERROR");
            document.getElementById("status").innerHTML = "Invalid server response";
            return;
        }

        document.getElementById("status").innerHTML = data.message;

    }catch(err){

        log("ERROR:");
        log(err.toString());

        document.getElementById("status").innerHTML = "Server error";
    }
}
</script>

</body>
</html>
`);
